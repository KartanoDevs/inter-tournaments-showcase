server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # REVERSE PROXY: Peticiones de API al backend
    # El nombre "backend" resuelve dentro de la red Docker
    # ==========================================
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para uploads de imágenes
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Tamaño máximo del body (mismo límite que el backend: 15mb)
        client_max_body_size 15m;
    }

    # ==========================================
    # REVERSE PROXY: Archivos estáticos del backend (imágenes subidas)
    # ==========================================
    location /public/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache de imágenes en el cliente (1 año)
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ==========================================
    # SPA: Fallback routing para Angular Router
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deshabilitar cache en index.html para evitar servir versiones obsoletas
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PWA: El service worker NO debe cachearse para que actualizaciones lleguen inmediatamente
    location = /ngsw-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PWA: MIME type correcto para el Web App Manifest
    location ~* \.webmanifest$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/manifest+json";
    }

    # Cache agresivo para assets compilados (Angular los hashea en producción)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
